name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    env:
      # Throwaway 32-byte AES-256 key — CI has no .env. Tests only need a
      # syntactically valid key to exercise encrypt/decrypt; it guards nothing.
      ENCRYPTION_KEY: O8NywVdOh7mZzSYmFPHpjSDK7EZx0kVbk2u7oNcVy5s=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q
